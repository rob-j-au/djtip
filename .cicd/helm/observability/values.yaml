# Observability Stack Configuration

# Prometheus + Grafana Stack
kube-prometheus-stack:
  enabled: true

  # Simplify naming - remove 'observability-kube-prometh-' prefix
  fullnameOverride: ""
  nameOverride: ""

  # Grafana configuration
  grafana:
    enabled: true
    fullnameOverride: "grafana"
    # adminPassword: ""  # Not needed - using anonymous auth

    # Use older sidecar image to avoid Python 3.14 SSL cert issues
    sidecar:
      image:
        tag: 2.5.0  # Uses Python 3.13, avoids SSL cert verification bug
      dashboards:
        enabled: true
      datasources:
        enabled: true

    # Anonymous authentication enabled
    grafana.ini:
      auth.anonymous:
        enabled: true
        org_role: Admin  # Give anonymous users admin role (for local dev only!)
      server:
        root_url: "http://grafana.minikube.local"

    # Pre-configure datasources
    additionalDataSources:
      # Loki for logs
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        jsonData:
          maxLines: 1000

      # Tempo for traces
      - name: Tempo
        type: tempo
        url: http://tempo:3100
        access: proxy
        jsonData:
          httpMethod: GET

    # Ingress for Grafana
    ingress:
      enabled: true
      ingressClassName: haproxy
      annotations:
        ingress.class: haproxy
      hosts:
        - grafana.minikube.local
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.minikube.local

    # Resource limits
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  # Prometheus configuration
  prometheus:
    enabled: true
    fullnameOverride: "prometheus"
    prometheusSpec:
      retention: 7d
      resources:
        requests:
          memory: "512Mi"
          cpu: "200m"
        limits:
          memory: "2Gi"
          cpu: "1000m"

      # Service monitors - automatically discover services
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false

      # Storage
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  # Alertmanager
  alertmanager:
    enabled: true
    fullnameOverride: "alertmanager"
    alertmanagerSpec:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "200m"

  # Prometheus Operator
  prometheusOperator:
    fullnameOverride: "prometheus-operator"

  # Node exporter - collects node metrics
  nodeExporter:
    enabled: true
    fullnameOverride: "node-exporter"

  # Kube-state-metrics - collects Kubernetes object metrics
  kubeStateMetrics:
    enabled: true
    fullnameOverride: "kube-state-metrics"

# Loki - Log aggregation
loki:
  enabled: true
  fullnameOverride: "loki"

  # Use older sidecar image to avoid Python 3.14 SSL cert issues
  sidecar:
    image:
      tag: 2.5.0  # Uses Python 3.13, avoids SSL cert verification bug
    rules:
      enabled: true

  # Single binary mode for simplicity (local dev)
  deploymentMode: SingleBinary

  singleBinary:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  # Disable other components
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  # Loki configuration
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: 'filesystem'
    schemaConfig:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

# Promtail - Log shipper (runs on every node)
promtail:
  enabled: true
  fullnameOverride: "promtail"

  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push

    # Scrape all pod logs
    snippets:
      scrapeConfigs: |
        - job_name: kubernetes-pods
          pipeline_stages:
            - cri: {}
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels:
                - __meta_kubernetes_pod_controller_name
              regex: ([0-9a-z-.]+?)(-[0-9a-f]{8,10})?
              action: replace
              target_label: __tmp_controller_name
            - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_name
                - __meta_kubernetes_pod_label_app
                - __tmp_controller_name
                - __meta_kubernetes_pod_name
              regex: ^;*([^;]+)(;.*)?$
              action: replace
              target_label: app
            - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_instance
                - __meta_kubernetes_pod_label_instance
              regex: ^;*([^;]+)(;.*)?$
              action: replace
              target_label: instance
            - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_component
                - __meta_kubernetes_pod_label_component
              regex: ^;*([^;]+)(;.*)?$
              action: replace
              target_label: component
            - action: replace
              source_labels:
              - __meta_kubernetes_pod_node_name
              target_label: node_name
            - action: replace
              source_labels:
              - __meta_kubernetes_namespace
              target_label: namespace
            - action: replace
              replacement: $1
              separator: /
              source_labels:
              - namespace
              - app
              target_label: job
            - action: replace
              source_labels:
              - __meta_kubernetes_pod_name
              target_label: pod
            - action: replace
              source_labels:
              - __meta_kubernetes_pod_container_name
              target_label: container
            - action: replace
              replacement: /var/log/pods/*$1/*.log
              separator: /
              source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
              target_label: __path__
            - action: replace
              regex: true/(.*)
              replacement: /var/log/pods/*$1/*.log
              separator: /
              source_labels:
              - __meta_kubernetes_pod_annotationpresent_kubernetes_io_config_hash
              - __meta_kubernetes_pod_annotation_kubernetes_io_config_hash
              - __meta_kubernetes_pod_container_name
              target_label: __path__

# Tempo - Distributed tracing (OpenTelemetry compatible)
tempo:
  enabled: true
  fullnameOverride: "tempo"

  tempo:
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

    # Receivers for different trace formats
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      jaeger:
        protocols:
          grpc:
            endpoint: 0.0.0.0:14250
          thrift_http:
            endpoint: 0.0.0.0:14268
      zipkin:
        endpoint: 0.0.0.0:9411

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
