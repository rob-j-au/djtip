# Staging environment overrides
# Inherits from values.yaml

# 2x resources compared to development
replicaCount: 4

worker:
  replicaCount: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# Staging-specific ingress
ingress:
  enabled: true
  className: "haproxy"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging-dns01"  # Use DNS-01 for staging
  hosts:
    - host: app.staging.djtip.jennings.au
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: djtip-staging-tls
      hosts:
        - app.staging.djtip.jennings.au

# Enable persistence for staging
mongodb:
  enabled: true
  auth:
    enabled: false
  architecture: standalone
  persistence:
    enabled: true
    size: 8Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

redis:
  enabled: true
  auth:
    enabled: false
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 4Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "400m"

# Staging environment variables (if different from production)
# env:
#   logLevel: "debug"  # Example: more verbose logging in staging
