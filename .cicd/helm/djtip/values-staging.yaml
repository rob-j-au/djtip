# Staging environment overrides
# Inherits from values.yaml

# Single replica to conserve Pi memory
replicaCount: 1

worker:
  replicaCount: 1
  resources:
    requests:
      memory: "150Mi"  # Actual usage: 127Mi
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

resources:
  requests:
    memory: "200Mi"  # Actual usage: 253Mi
    cpu: "100m"
  limits:
    memory: "384Mi"
    cpu: "500m"

# Staging-specific ingress
ingress:
  enabled: true
  className: "haproxy"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"  # Use production Let's Encrypt
  hosts:
    - host: app.staging.djtip.jennings.au
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: djtip-staging-tls
      hosts:
        - app.staging.djtip.jennings.au

# Enable persistence for staging
mongodb:
  enabled: true
  auth:
    enabled: false
  architecture: standalone
  persistence:
    enabled: true
    size: 8Gi
  resources:
    requests:
      memory: "256Mi"  # Increased from 150Mi - was causing OOMKills
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

redis:
  enabled: true
  auth:
    enabled: false
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 4Gi
    resources:
      requests:
        memory: "64Mi"  # Actual usage: 10Mi
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"

# Staging environment variables (if different from production)
# env:
#   logLevel: "debug"  # Example: more verbose logging in staging
