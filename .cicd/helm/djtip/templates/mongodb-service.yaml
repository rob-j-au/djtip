apiVersion: v1
kind: Service
metadata:
  name: {{ include "djtip.fullname" . }}-mongodb
  labels:
    {{- include "djtip.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: mongodb
      protocol: TCP
      name: mongodb
  selector:
    {{- include "djtip.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
