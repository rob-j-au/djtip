apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "djtip.fullname" . }}-env
  labels:
    {{- include "djtip.labels" . | nindent 4 }}
data:
  # Rails Environment
  RAILS_ENV: {{ .Values.env.railsEnv | quote }}
  RAILS_LOG_TO_STDOUT: {{ .Values.env.railsLogToStdout | quote }}
  RAILS_SERVE_STATIC_FILES: {{ .Values.env.railsServeStaticFiles | quote }}
  RACK_ENV: {{ .Values.env.rackEnv | quote }}

  # Puma Configuration
  RAILS_MAX_THREADS: {{ .Values.env.railsMaxThreads | quote }}
  RAILS_MIN_THREADS: {{ .Values.env.railsMinThreads | quote }}
  WEB_CONCURRENCY: {{ .Values.env.webConcurrency | quote }}
  PORT: {{ .Values.env.port | quote }}

  # Database Configuration
  MONGODB_URI: {{ .Values.env.mongodbUri | default (printf "mongodb://%s-mongodb:27017/djtip_%s" .Release.Name .Values.env.railsEnv) | quote }}

  # Redis Configuration
  REDIS_URL: {{ .Values.env.redisUrl | default (printf "redis://%s-redis-master:6379/0" .Release.Name) | quote }}

  # OpenTelemetry Configuration
  OTEL_SERVICE_NAME: {{ .Values.env.otelServiceName | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.env.otelExporterOtlpEndpoint | quote }}
  OTEL_TRACES_EXPORTER: {{ .Values.env.otelTracesExporter | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.env.otelExporterOtlpProtocol | quote }}
  OTEL_TRACE_SAMPLE_RATE: {{ .Values.env.otelTraceSampleRate | quote }}

  # Logging Configuration
  LOG_LEVEL: {{ .Values.env.logLevel | quote }}
