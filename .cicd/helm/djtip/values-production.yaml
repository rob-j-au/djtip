# Production environment overrides
# Inherits from values.yaml

# 2x resources compared to development
replicaCount: 4

# Production-specific image settings
image:
  pullPolicy: IfNotPresent  # Use cached images in production
  tag: "stable"  # Use stable tag for production

# Production-specific ingress
ingress:
  enabled: true
  className: "haproxy"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"  # Use DNS-01 for production
  hosts:
    - host: app.djtip.jennings.au
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: djtip-production-tls
      hosts:
        - app.djtip.jennings.au

# Web pod resources - 2x development
resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# Enable autoscaling in production
autoscaling:
  enabled: true
  minReplicas: 4
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

# Sidekiq worker configuration - 2x development
worker:
  replicaCount: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

metrics:
  enabled: true

# MongoDB configuration - 2x development
mongodb:
  enabled: true
  auth:
    enabled: true  # Enable auth for production
  architecture: standalone
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# Redis configuration - 2x development
redis:
  enabled: true
  auth:
    enabled: true  # Enable auth for production
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "400m"
