# Production environment overrides
# Inherits from values.yaml

# Single replica to conserve Pi memory
replicaCount: 1

# Production-specific image settings
image:
  pullPolicy: IfNotPresent  # Use cached images in production
  tag: "latest"  # Use latest tag for production

# Production-specific ingress
ingress:
  enabled: true
  className: "haproxy"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"  # Use DNS-01 for production
  hosts:
    - host: app.djtip.jennings.au
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: djtip-production-tls
      hosts:
        - app.djtip.jennings.au

# Web pod resources - optimized for Pi
resources:
  requests:
    memory: "256Mi"  # Reduced based on actual usage
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Autoscaling disabled due to Pi memory constraints
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

# Sidekiq worker configuration
worker:
  replicaCount: 1
  resources:
    requests:
      memory: "256Mi"  # Reduced based on actual usage
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

metrics:
  enabled: true

# MongoDB configuration - optimized for Pi
mongodb:
  enabled: true
  auth:
    enabled: false  # Disable auth to match staging/dev
  architecture: standalone
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: "350Mi"  # Based on staging actual usage: 318Mi
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Redis configuration - optimized for Pi
redis:
  enabled: true
  auth:
    enabled: false  # Disable auth to match staging
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        memory: "64Mi"  # Based on staging actual usage: 10Mi
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"
