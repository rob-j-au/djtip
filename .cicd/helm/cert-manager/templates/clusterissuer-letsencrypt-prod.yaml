apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.letsencrypt.email | default "admin@example.com" }}
    
    # Store account key in secret
    privateKeySecretRef:
      name: letsencrypt-prod
    
    # Use HTTP-01 challenge
    solvers:
    - http01:
        ingress:
          class: haproxy
