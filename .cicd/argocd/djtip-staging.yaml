apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: djtip-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Update this to your actual Git repository URL
    repoURL: https://github.com/rob-j-au/djtip.git
    targetRevision: staging
    path: .cicd/helm/djtip
    helm:
      valueFiles:
        - values-staging.yaml
      # Build dependencies before deploying
      skipCrds: false

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    # Automated sync - comment out for manual sync
    automated:
      prune: true      # Delete resources that are no longer in Git
      selfHeal: true   # Sync when cluster state differs from Git
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore differences in certain fields (optional)
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
