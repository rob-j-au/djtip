apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: djtip-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/rob-j-au/djtip.git
    targetRevision: main
    path: .cicd/helm/djtip
    helm:
      valueFiles:
        - values-production.yaml
      skipCrds: false

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    # Manual sync for production - no automated changes
    automated: null

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
