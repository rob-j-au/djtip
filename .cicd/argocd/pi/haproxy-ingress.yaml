apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: haproxy-ingress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/rob-j-au/djtip.git
    targetRevision: main
    path: .cicd/helm/haproxy-ingress
    helm:
      releaseName: haproxy
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: haproxy-controller

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
