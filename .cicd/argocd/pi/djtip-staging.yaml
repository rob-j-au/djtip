apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: djtip-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/rob-j-au/djtip.git
    targetRevision: staging
    path: .cicd/helm/djtip
    helm:
      valueFiles:
        - values-staging.yaml
      parameters:
        - name: ingress.hosts[0].host
          value: "djtip-staging.k8s.pi.jennings.au"
        - name: ingress.tls[0].hosts[0]
          value: "djtip-staging.k8s.pi.jennings.au"
        - name: ingress.tls[0].secretName
          value: "djtip-staging-tls"
      skipCrds: false

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
