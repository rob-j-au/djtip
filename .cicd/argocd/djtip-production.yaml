apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: djtip-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Update this to your actual Git repository URL
    repoURL: https://github.com/rob-j-au/djtip.git
    targetRevision: release  # Use release branch for production
    path: .cicd/helm/djtip
    helm:
      valueFiles:
        - values-production.yaml
      # Build dependencies before deploying
      skipCrds: false

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    # Manual sync for production - no automated changes
    automated: null

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore differences in certain fields (optional)
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
